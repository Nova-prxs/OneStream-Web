<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OneStream Study Guide{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/nova-icon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Pico CSS (base for inner page components) + custom overrides -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/pygments.css">
  <link rel="stylesheet" href="/static/css/nova-theme.css">
  <link rel="stylesheet" href="/static/css/style.css?v=4">

  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <!-- Animated background blobs -->
  <div class="nova-blobs">
    <div class="nova-blob-1"></div>
    <div class="nova-blob-2"></div>
    <div class="nova-blob-3"></div>
  </div>

  <header class="container">
    <nav class="site-nav">
      <div class="nav-brand">
        <a href="/" class="site-title" style="display:flex;align-items:center;gap:0.5rem;">
          <img src="/static/nova-icon.svg" alt="Nova" style="width:28px;height:28px;border-radius:6px;">
          <strong>OneStream Portal</strong>
        </a>
      </div>
      <div class="nav-links">
        <a href="/docs/">API Reference</a>
        <span class="nav-sep">|</span>
        <form action="/exam-prep/search" method="get" role="search" class="search-form">
          <input type="search" name="q" placeholder="Search chapters..." aria-label="Search" value="{{ request.args.get('q', '') }}">
        </form>
        <a href="/exam-prep/quiz">Quiz</a>
        <a href="/exam-prep/exam">Exam</a>
        <a href="/exam-prep/flashcards">Flashcards</a>
        <a href="/exam-prep/highlights">Highlights</a>
        <a href="/exam-prep/progress">Progress</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode" id="theme-btn">
          <i class="ph ph-moon" id="icon-moon"></i>
          <i class="ph ph-sun" id="icon-sun" style="display:none"></i>
        </button>
      </div>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {# Pomodoro Timer Widget #}
  <div class="pomodoro-widget" id="pomodoro-widget">
    <button class="pomodoro-toggle" onclick="togglePomodoro()" aria-label="Study timer" id="pomodoro-btn">&#9201;</button>
    <div class="pomodoro-panel" id="pomodoro-panel" style="display:none">
      <div class="pomodoro-display" id="pomodoro-display">25:00</div>
      <div class="pomodoro-label" id="pomodoro-label">Study</div>
      <div class="pomodoro-controls">
        <button onclick="startPomodoro()" id="pomo-start">Start</button>
        <button onclick="pausePomodoro()" id="pomo-pause" style="display:none">Pause</button>
        <button onclick="resetPomodoro()" class="outline">Reset</button>
      </div>
      <div class="pomodoro-sessions">
        <small>Sessions today: <strong id="pomo-sessions">0</strong> (<span id="pomo-total-time">0</span> min)</small>
      </div>
    </div>
  </div>

  <footer class="container">
    <small>OS-201 Certification Prep — <kbd>?</kbd> for keyboard shortcuts</small>
  </footer>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
    }
    function updateThemeIcon() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var moon = document.getElementById('icon-moon');
      var sun = document.getElementById('icon-sun');
      if (moon) moon.style.display = isDark ? 'none' : '';
      if (sun) sun.style.display = isDark ? '' : 'none';
    }
    updateThemeIcon();

    // --- Pomodoro Timer ---
    var pomoState = 'stopped';
    var pomoSeconds = 25 * 60;
    var pomoMode = 'study';
    var pomoInterval = null;
    var pomoTodayKey = 'pomodoro_' + new Date().toISOString().slice(0,10);

    function loadPomoSessions() {
      try {
        var raw = localStorage.getItem(pomoTodayKey);
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return { count: 0, minutes: 0 };
    }
    function savePomoSession() {
      var data = loadPomoSessions();
      data.count++;
      data.minutes += 25;
      localStorage.setItem(pomoTodayKey, JSON.stringify(data));
      updatePomoDisplay();
    }
    function updatePomoDisplay() {
      var m = Math.floor(pomoSeconds / 60);
      var s = pomoSeconds % 60;
      document.getElementById('pomodoro-display').textContent = m + ':' + (s < 10 ? '0' : '') + s;
      document.getElementById('pomodoro-label').textContent = pomoMode === 'study' ? 'Study' : 'Break';
      var sessions = loadPomoSessions();
      document.getElementById('pomo-sessions').textContent = sessions.count;
      document.getElementById('pomo-total-time').textContent = sessions.minutes;
      var display = document.getElementById('pomodoro-display');
      display.className = 'pomodoro-display' + (pomoMode === 'break' ? ' pomo-break' : '');
    }
    function togglePomodoro() {
      var panel = document.getElementById('pomodoro-panel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      updatePomoDisplay();
    }
    function startPomodoro() {
      pomoState = 'running';
      document.getElementById('pomo-start').style.display = 'none';
      document.getElementById('pomo-pause').style.display = '';
      pomoInterval = setInterval(function() {
        pomoSeconds--;
        updatePomoDisplay();
        if (pomoSeconds <= 0) {
          clearInterval(pomoInterval);
          if (pomoMode === 'study') {
            savePomoSession();
            pomoMode = 'break';
            pomoSeconds = 5 * 60;
            updatePomoDisplay();
            try { new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ==').play(); } catch(e) {}
            alert('Study session complete! Take a 5-minute break.');
            startPomodoro();
          } else {
            pomoMode = 'study';
            pomoSeconds = 25 * 60;
            pomoState = 'stopped';
            document.getElementById('pomo-start').style.display = '';
            document.getElementById('pomo-pause').style.display = 'none';
            updatePomoDisplay();
            alert('Break over! Ready for another session?');
          }
        }
      }, 1000);
    }
    function pausePomodoro() {
      if (pomoState === 'running') {
        clearInterval(pomoInterval);
        pomoState = 'paused';
        document.getElementById('pomo-start').style.display = '';
        document.getElementById('pomo-pause').style.display = 'none';
        document.getElementById('pomo-start').textContent = 'Resume';
      }
    }
    function resetPomodoro() {
      clearInterval(pomoInterval);
      pomoState = 'stopped';
      pomoMode = 'study';
      pomoSeconds = 25 * 60;
      document.getElementById('pomo-start').style.display = '';
      document.getElementById('pomo-start').textContent = 'Start';
      document.getElementById('pomo-pause').style.display = 'none';
      updatePomoDisplay();
    }
    updatePomoDisplay();
  </script>
</body>
</html>
