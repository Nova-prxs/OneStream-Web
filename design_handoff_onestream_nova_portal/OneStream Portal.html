<title>OneStream — Nova Portal</title>
<style>
/* ==========================================================================
   Nova — Design Tokens
   Single source of truth. Import once in any page: <link href="/tokens.css">.
   ========================================================================== */

/* -------------------- 1. Fonts -------------------- */
@font-face {
  font-family: "Gilroy";
  src: url("./fonts/Gilroy-Light.ttf") format("truetype");
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Gilroy";
  src: url("./fonts/Gilroy-Regular.ttf") format("truetype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Gilroy";
  src: url("./fonts/Gilroy-Bold.ttf") format("truetype");
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

/* -------------------- 2. Tokens -------------------- */
:root {
  /* — Color — brand core */
  --nova-coral:       #FF5948;  /* primary. Pantone-ish warm red */
  --nova-coral-ink:   #E84636;  /* pressed / focused */
  --nova-coral-soft:  #FFE8E4;  /* tints, surfaces */

  --nova-teal:        #1A8A7F;  /* secondary. Deep, confident */
  --nova-teal-ink:    #147168;
  --nova-teal-soft:   #D6EDEA;

  --nova-aqua:        #A7E8E4;  /* supporting. Calm, aerated */
  --nova-aqua-soft:   #E7F7F6;

  --nova-ink:         #2E3A40;  /* primary text / dark surfaces */
  --nova-ink-2:       #4B5761;  /* secondary text */
  --nova-ink-3:       #7A8690;  /* tertiary / muted */

  --nova-bone:        #F4F2EE;  /* off-white page surface */
  --nova-paper:       #FFFFFF;
  --nova-line:        #E4E4E4;  /* hairlines, dividers */
  --nova-line-soft:   #EFEDE8;

  /* — Semantic aliases — */
  --color-bg:         var(--nova-bone);
  --color-surface:    var(--nova-paper);
  --color-text:       var(--nova-ink);
  --color-text-2:     var(--nova-ink-2);
  --color-text-3:     var(--nova-ink-3);
  --color-primary:    var(--nova-coral);
  --color-accent:     var(--nova-teal);
  --color-line:       var(--nova-line);

  /* — Type — */
  --font-sans: "Gilroy", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* fluid-ish scale. Use for desktop / marketing; mobile overrides below. */
  --fs-display: 88px;   /* hero */
  --fs-h1:      56px;
  --fs-h2:      40px;
  --fs-h3:      28px;
  --fs-h4:      20px;
  --fs-body-l:  18px;
  --fs-body:    16px;
  --fs-small:   14px;
  --fs-micro:   12px;

  --lh-tight:   1.05;
  --lh-snug:    1.2;
  --lh-body:    1.5;
  --lh-loose:   1.65;

  --tracking-tight:   -0.02em;
  --tracking-normal:  0;
  --tracking-wide:    0.08em;
  --tracking-wider:   0.16em;

  /* — Space scale (4px base) — */
  --s-0:   0;
  --s-1:   4px;
  --s-2:   8px;
  --s-3:   12px;
  --s-4:   16px;
  --s-5:   24px;
  --s-6:   32px;
  --s-7:   48px;
  --s-8:   64px;
  --s-9:   96px;
  --s-10: 128px;
  --s-11: 192px;

  /* — Radius — */
  --r-xs:  4px;
  --r-sm:  8px;
  --r-md:  14px;
  --r-lg:  24px;
  --r-xl:  40px;
  --r-pill: 999px;

  /* — Elevation. Shadows are quiet; the brand prefers flat + color. — */
  --shadow-1: 0 1px 2px rgba(46, 58, 64, 0.04), 0 1px 1px rgba(46, 58, 64, 0.03);
  --shadow-2: 0 6px 16px rgba(46, 58, 64, 0.06), 0 2px 4px rgba(46, 58, 64, 0.04);
  --shadow-3: 0 20px 48px rgba(46, 58, 64, 0.10), 0 6px 12px rgba(46, 58, 64, 0.05);
  --shadow-coral: 0 14px 34px rgba(255, 89, 72, 0.28);

  /* — Motion — */
  --dur-1: 120ms;
  --dur-2: 220ms;
  --dur-3: 360ms;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);

  /* — Grain. A subtle noise layer used on full-bleed color fills. — */
  --grain:
    radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px) 0 0 / 3px 3px,
    radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px) 1px 1px / 3px 3px;
}

/* -------------------- 3. Base reset-ish -------------------- */
*,
*::before,
*::after { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  color: var(--color-text);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  text-wrap: pretty;
}

/* -------------------- 4. Type utilities -------------------- */
.display  { font-size: var(--fs-display); line-height: var(--lh-tight); letter-spacing: var(--tracking-tight); font-weight: 700; }
.h1       { font-size: var(--fs-h1);      line-height: var(--lh-tight); letter-spacing: var(--tracking-tight); font-weight: 700; }
.h2       { font-size: var(--fs-h2);      line-height: var(--lh-snug);  letter-spacing: var(--tracking-tight); font-weight: 700; }
.h3       { font-size: var(--fs-h3);      line-height: var(--lh-snug);  font-weight: 700; }
.h4       { font-size: var(--fs-h4);      line-height: var(--lh-snug);  font-weight: 700; }
.body-l   { font-size: var(--fs-body-l);  line-height: var(--lh-body); }
.body     { font-size: var(--fs-body);    line-height: var(--lh-body); }
.small    { font-size: var(--fs-small);   line-height: var(--lh-body); }
.micro    { font-size: var(--fs-micro);   line-height: var(--lh-body); }
.eyebrow  {
  font-size: var(--fs-micro);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  font-weight: 700;
  color: var(--color-text-2);
}
.mono     { font-family: var(--font-mono); }

/* -------------------- 5. Surface utilities -------------------- */
.surface-bone  { background: var(--nova-bone);  color: var(--nova-ink); }
.surface-paper { background: var(--nova-paper); color: var(--nova-ink); }
.surface-coral { background: var(--nova-coral); color: var(--nova-paper); }
.surface-teal  { background: var(--nova-teal);  color: var(--nova-paper); }
.surface-aqua  { background: var(--nova-aqua);  color: var(--nova-ink); }
.surface-ink   { background: var(--nova-ink);   color: var(--nova-paper); }

/* Grain overlay helper — add on full-bleed color fills */
.has-grain { position: relative; isolation: isolate; }
.has-grain::after {
  content: "";
  position: absolute; inset: 0;
  background-image: var(--grain);
  opacity: .35;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 0;
}
.has-grain > * { position: relative; z-index: 1; }

</style>
<style>
/* ===========================================================
   OneStream Portal — Nova Design System application layer
   Built on top of tokens.css
   =========================================================== */

/* -------------------- Theme: Dark mode overrides -------------------- */
:root[data-theme="dark"] {
  --color-bg: var(--nova-ink);
  --color-surface: #39464C;
  --color-text: #F5E7D8;
  --color-text-2: #C7CDD1;
  --color-text-3: #8A949B;
  --color-line: #4B5761;
  --nova-line: #3C474D;
  --nova-line-soft: #354048;
  --nova-bone: var(--nova-ink);
  --nova-paper: #39464C;
  --nova-paper-2: #2F3A40;
}

/* -------------------- Reset & base -------------------- */
html, body { min-height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--color-bg);
  color: var(--color-text);
  transition: background 320ms var(--ease-out), color 320ms var(--ease-out);
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
* { box-sizing: border-box; }

/* -------------------- Shell layout -------------------- */
.nv-shell {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* -------------------- Sidebar -------------------- */
.nv-sidebar {
  background: var(--nova-paper);
  border-right: 1px solid var(--nova-line);
  padding: 24px 16px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.nv-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px 20px;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.nv-brand-mark {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--nova-coral);
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
}
.nv-brand-mark img { display: none; }
.nv-brand-mark::after {
  content: "";
  position: absolute;
  inset: 0;
  background-color: var(--nova-aqua);
  -webkit-mask-image: var(--nv-logo-mask);
  mask-image: var(--nv-logo-mask);
  -webkit-mask-size: contain;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-position: center;
  mask-position: center;
}
.nv-brand-mark svg { width: 20px; height: 20px; }
.nv-brand-name small {
  display: block;
  font-size: 11px;
  font-weight: 400;
  color: var(--color-text-3);
  letter-spacing: 0.02em;
  margin-top: 2px;
}
.nv-nav-group {
  margin-top: 16px;
}
.nv-nav-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--color-text-3);
  padding: 8px 12px 6px;
}
.nv-nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-2);
  transition: all 140ms var(--ease-out);
  cursor: pointer;
}
.nv-nav-item:hover {
  background: var(--nova-line-soft);
  color: var(--color-text);
}
.nv-nav-item.active {
  background: var(--nova-ink);
  color: var(--nova-paper);
}
:root[data-theme="dark"] .nv-nav-item.active {
  background: var(--nova-coral);
  color: #fff;
}
.nv-nav-item .glyph {
  width: 18px; height: 18px;
  flex-shrink: 0;
}
.nv-nav-item .badge {
  margin-left: auto;
  background: var(--nova-coral-soft);
  color: var(--nova-coral-ink);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
}
.nv-nav-item.active .badge {
  background: rgba(255,255,255,0.15);
  color: var(--nova-paper);
}

.nv-sidebar-footer {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--nova-line);
}

/* -------------------- Top bar (in content) -------------------- */
.nv-topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 40px;
  border-bottom: 1px solid var(--nova-line);
  background: var(--color-bg);
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(8px);
  background: color-mix(in oklab, var(--color-bg) 92%, transparent);
}
.nv-search {
  flex: 1;
  max-width: 480px;
  position: relative;
}
.nv-search input {
  width: 100%;
  height: 40px;
  border: 1px solid var(--nova-line);
  background: var(--nova-paper);
  border-radius: var(--r-md);
  padding: 0 14px 0 40px;
  font-size: 14px;
  transition: border-color 140ms;
}
.nv-search input:focus {
  outline: none;
  border-color: var(--nova-coral);
}
.nv-search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-3);
  pointer-events: none;
}
.nv-search kbd {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-3);
  background: var(--nova-line-soft);
  padding: 2px 6px;
  border-radius: 4px;
}
.nv-topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.nv-icon-btn {
  width: 40px; height: 40px;
  border-radius: var(--r-md);
  border: 1px solid var(--nova-line);
  background: var(--nova-paper);
  display: grid;
  place-items: center;
  transition: all 140ms;
}
.nv-icon-btn:hover {
  border-color: var(--nova-ink);
  transform: translateY(-1px);
}

/* -------------------- Content -------------------- */
.nv-main { min-width: 0; }
.nv-page { padding: 40px; max-width: 1280px; margin: 0 auto; }
.nv-page-narrow { max-width: 900px; }

/* -------------------- Breadcrumb -------------------- */
.nv-crumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--color-text-3);
  margin-bottom: 20px;
}
.nv-crumb a { color: var(--color-text-3); transition: color 140ms; }
.nv-crumb a:hover { color: var(--nova-coral); }
.nv-crumb .sep { opacity: 0.5; }
.nv-crumb .current { color: var(--color-text); font-weight: 500; }

/* -------------------- Buttons -------------------- */
.nv-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 44px;
  padding: 0 20px;
  border-radius: var(--r-pill);
  font-weight: 600;
  font-size: 14px;
  transition: transform 140ms var(--ease-out), box-shadow 220ms, background 140ms;
}
.nv-btn--primary {
  background: var(--nova-coral);
  color: var(--nova-paper);
}
.nv-btn--primary:hover {
  background: var(--nova-coral-ink);
  transform: translateY(-1px);
  box-shadow: var(--shadow-coral);
}
.nv-btn--ghost {
  border: 1.5px solid var(--nova-ink);
  color: var(--nova-ink);
}
:root[data-theme="dark"] .nv-btn--ghost {
  border-color: #F5E7D8;
  color: #F5E7D8;
}
.nv-btn--ghost:hover { background: var(--nova-ink); color: var(--nova-paper); }
.nv-btn--teal { background: var(--nova-teal); color: var(--nova-paper); }
.nv-btn--teal:hover { background: var(--nova-teal-ink); }

/* -------------------- Cards -------------------- */
.nv-card {
  background: var(--nova-paper);
  border: 1px solid var(--nova-line);
  border-radius: var(--r-lg);
  padding: 28px;
  transition: border-color 220ms, transform 220ms var(--ease-out);
}
.nv-card:hover {
  border-color: var(--nova-ink);
  transform: translateY(-2px);
}
.nv-card h3 { margin: 0 0 8px; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
.nv-card p { margin: 0; color: var(--color-text-2); font-size: 14px; line-height: 1.55; }

/* -------------------- Eyebrow -------------------- */
.nv-eyebrow {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--color-text-2);
}

/* -------------------- Pomodoro widget -------------------- */
.nv-pomo {
  position: fixed;
  right: 24px; bottom: 24px;
  z-index: 100;
}
.nv-pomo-fab {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--nova-ink);
  color: var(--nova-paper);
  box-shadow: var(--shadow-3);
  display: grid;
  place-items: center;
  transition: transform 220ms var(--ease-out);
}
.nv-pomo-fab:hover { transform: scale(1.05); }
.nv-pomo-fab.running { background: var(--nova-coral); }
.nv-pomo-panel {
  position: absolute;
  bottom: 72px; right: 0;
  width: 280px;
  background: var(--nova-paper);
  border: 1px solid var(--nova-line);
  border-radius: var(--r-lg);
  padding: 24px;
  box-shadow: var(--shadow-3);
  display: none;
}
.nv-pomo-panel.open { display: block; }
.nv-pomo-time {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.03em;
  text-align: center;
  line-height: 1;
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}
.nv-pomo-time.break { color: var(--nova-teal); }
.nv-pomo-label {
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--color-text-3);
  margin-bottom: 16px;
}
.nv-pomo-btns { display: flex; gap: 8px; }
.nv-pomo-btns button {
  flex: 1;
  height: 36px;
  border-radius: var(--r-sm);
  font-weight: 600;
  font-size: 13px;
  transition: all 140ms;
}
.nv-pomo-btns .start { background: var(--nova-coral); color: var(--nova-paper); }
.nv-pomo-btns .start:hover { background: var(--nova-coral-ink); }
.nv-pomo-btns .reset { border: 1px solid var(--nova-line); }

/* -------------------- Utility -------------------- */
.stack-4 > * + * { margin-top: 4px; }
.stack-8 > * + * { margin-top: 8px; }
.stack-16 > * + * { margin-top: 16px; }
.stack-24 > * + * { margin-top: 24px; }
.row { display: flex; align-items: center; gap: 12px; }

/* Subtle fade-in */
.fade-in {
  animation: fadeIn 360ms var(--ease-out) both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Nova glyph decorations */
.glyph-bg {
  position: absolute;
  pointer-events: none;
  opacity: 0.08;
  z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--nova-line); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-text-3); }

</style>
<style>
  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 24px; top: 24px;
    width: 300px; z-index: 200;
    background: var(--nova-paper);
    border: 1px solid var(--nova-line);
    border-radius: 20px; padding: 20px;
    box-shadow: var(--shadow-3);
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--nova-line); }
  .tweaks-row:first-of-type { border-top: 0; }
  .tweaks-row label { font-size: 13px; font-weight: 500; color: var(--color-text-2); }
  .tweaks-btns { display: flex; gap: 4px; }
  .tweaks-btns button {
    padding: 5px 10px; font-size: 11px; font-weight: 600;
    border-radius: 999px; background: var(--nova-line-soft);
    color: var(--color-text-2); border: 1px solid transparent;
  }
  .tweaks-btns button.on { background: var(--nova-ink); color: #fff; }
</style>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

function Pomodoro() {
  const [open, setOpen] = React.useState(false);
  const [running, setRunning] = React.useState(false);
  const [mode, setMode] = React.useState("study"); // study | break
  const [seconds, setSeconds] = React.useState(25 * 60);
  const intv = React.useRef(null);

  React.useEffect(() => {
    if (running) {
      intv.current = setInterval(() => {
        setSeconds(s => {
          if (s <= 1) {
            clearInterval(intv.current);
            setRunning(false);
            setMode(m => m === "study" ? "break" : "study");
            return (mode === "study" ? 5 : 25) * 60;
          }
          return s - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intv.current);
  }, [running, mode]);

  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  const time = `${m}:${String(s).padStart(2, "0")}`;

  return (
    <div className="nv-pomo">
      {open && (
        <div className="nv-pomo-panel open fade-in">
          <div className={`nv-pomo-time ${mode === "break" ? "break" : ""}`}>{time}</div>
          <div className="nv-pomo-label">{mode === "study" ? "Focus Session" : "Break"}</div>
          <div className="nv-pomo-btns">
            <button className="start" onClick={() => setRunning(r => !r)}>
              {running ? "Pause" : "Start"}
            </button>
            <button className="reset" onClick={() => {
              setRunning(false);
              setMode("study");
              setSeconds(25 * 60);
            }}>Reset</button>
          </div>
          <div style={{ marginTop: 16, fontSize: 11, textAlign: "center", color: "var(--color-text-3)", letterSpacing: "0.08em", textTransform: "uppercase" }}>
            Sessions today: <strong style={{ color: "var(--nova-coral)" }}>3</strong> · 75 min
          </div>
        </div>
      )}
      <button className={`nv-pomo-fab ${running ? "running" : ""}`} onClick={() => setOpen(o => !o)}>
        <Glyph kind="timer" size={22} color="#fff" />
      </button>
    </div>
  );
}

function Crumb({ items }) {
  return (
    <nav className="nv-crumb">
      {items.map((it, i) => (
        <React.Fragment key={i}>
          {i > 0 && <span className="sep">/</span>}
          {it.onClick ? <a onClick={it.onClick} style={{ cursor: "pointer" }}>{it.label}</a> :
           <span className={i === items.length - 1 ? "current" : ""}>{it.label}</span>}
        </React.Fragment>
      ))}
    </nav>
  );
}

<script type="text/babel">
const { useState, useEffect } = React;

// Tweak defaults — EDITMODE block (JSON)
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "portalVariant": "A",
  "density": "comfy",
  "logoVariant": "stream"
}/*EDITMODE-END*/;

function TweaksPanel({ open, state, setState }) {
  const update = (key, val) => {
    const next = { ...state, [key]: val };
    setState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };
  if (!open) return null;
  return (
    <div className="tweaks-panel open fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <strong style={{ fontSize: 14 }}>Tweaks</strong>
        <span style={{ fontSize: 10, color: "var(--color-text-3)", textTransform: "uppercase", letterSpacing: "0.14em", fontWeight: 700 }}>Nova</span>
      </div>
      <div className="tweaks-row">
        <label>Theme</label>
        <div className="tweaks-btns">
          {["light", "dark"].map(v => (
            <button key={v} className={state.theme === v ? "on" : ""} onClick={() => update("theme", v)}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweaks-row">
        <label>Portal hero</label>
        <div className="tweaks-btns">
          {["A", "B", "C"].map(v => (
            <button key={v} className={state.portalVariant === v ? "on" : ""} onClick={() => update("portalVariant", v)}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweaks-row">
        <label>Density</label>
        <div className="tweaks-btns">
          {["comfy", "dense"].map(v => (
            <button key={v} className={state.density === v ? "on" : ""} onClick={() => update("density", v)}>{v}</button>
          ))}
        </div>
      </div>
      <div style={{ marginTop: 14, padding: 12, background: "var(--nova-aqua-soft, var(--nova-line-soft))", borderRadius: 10, fontSize: 11, lineHeight: 1.5, color: "var(--color-text-2)" }}>
        Variant A = bold coral hero · B = split + teardrop · C = editorial teal magazine
      </div>
    </div>
  );
}

function App() {
  const [page, _setPage] = useState(() => localStorage.getItem("osp:page") || "portal");
  const [state, setState] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const setPage = (p) => {
    _setPage(p);
    localStorage.setItem("osp:page", p);
    window.scrollTo({ top: 0, behavior: "instant" });
  };

  // Apply theme
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", state.theme);
  }, [state.theme]);

  // Density → compact spacing
  useEffect(() => {
    document.documentElement.style.setProperty("--density-scale", state.density === "dense" ? "0.85" : "1");
  }, [state.density]);

  // Logo variant — set global so NovaMark re-reads on next render
  const [, forceTick] = useState(0);
  useEffect(() => {
    window.__logoVariant = state.logoVariant;
    forceTick(t => t + 1);
  }, [state.logoVariant]);

  // Edit mode handshake
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const toggleTheme = () => {
    const next = state.theme === "dark" ? "light" : "dark";
    setState(s => ({ ...s, theme: next }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: next } }, '*');
  };

  return (
    <>
      <div className="nv-shell">
        <Sidebar page={page} setPage={setPage} />
        <div className="nv-main" data-screen-label={`${pageLabel(page)}`}>
          <TopBar theme={state.theme} toggleTheme={toggleTheme} />
          <div key={page}>
            {page === "portal" && <PortalPage setPage={setPage} variant={state.portalVariant} setVariant={(v) => {
              setState(s => ({ ...s, portalVariant: v }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { portalVariant: v } }, '*');
            }} />}
            {page === "index" && <ExamIndexPage setPage={setPage} />}
            {page === "chapter" && <ChapterPage setPage={setPage} />}
            {page === "quiz-sections" && <QuizSectionsPage setPage={setPage} />}
            {page === "quiz" && <QuizPage setPage={setPage} />}
            {page === "progress" && <ProgressPage setPage={setPage} />}
            {page === "flashcards" && <FlashcardsPage setPage={setPage} />}
            {page === "glossary" && <GlossaryPage setPage={setPage} />}
            {page === "api" && <ApiPage setPage={setPage} />}
            {page === "rules" && <RulesPage setPage={setPage} />}
            {page === "extension" && <ExtensionPage setPage={setPage} />}
          </div>
        </div>
      </div>
      <Pomodoro />
      <TweaksPanel open={tweaksOpen} state={state} setState={setState} />
    </>
  );
}

function pageLabel(page) {
  const labels = {
    portal: "Portal", index: "Exam Home", chapter: "Chapter Reader",
    "quiz-sections": "Quiz Sections", quiz: "Quiz", progress: "Progress",
    flashcards: "Flashcards", glossary: "Glossary", api: "API Reference",
    rules: "Business Rules", extension: "Extension Guide"
  };
  return labels[page] || page;
}

// Wait for all scripts to load
function tryMount() {
  if (window.Sidebar && window.PortalPage && window.ExamIndexPage && window.ApiPage) {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  } else {
    setTimeout(tryMount, 50);
  }
}
tryMount();
</script>
</body>
</html>
